# Fixed coordinates are 0-based half-open intervals [start, start + length).
project:
  name: tagforge_example
  workdir: ..
  output_dir: 02_output

samples:
  auto:
    raw_dir: examples/small_fastq
    r1: "{sample}_raw_1.fq.gz"
    r2: "{sample}_raw_2.fq.gz"

barcode2_annotation:
  fb_info: examples/FB_info.tsv
  id_column: FB_ID
  sequence_column: sequence
  name_column: antibody_name

correction_barcode:
  enabled: true
  max_shift: 1
  max_mismatch: 1
  allow_shift: true
  allow_mismatch: true

linker:
  max_mismatch: 0

correction_umi:
  method: directional
  max_distance: 1

# barcode1/barcode2/umi are output roles; name is the custom target name shown
# in extraction stats, correction trace, and QC logs.
barcode1:
  name: CELL
  segments:
    # Methods may be combined as `methods: [linker, fixed]`: linker is tried
    # first, and only failed reads use fixed on the original read coordinates.
    - segment: CELL
      read: R1
      methods: [linker, fixed]
      right_linker: AGGTC
      start: 0
      length: 8
      whitelist: examples/CELL_WL.txt

barcode2:
  name: FB
  segments:
    - segment: FB
      read: R2
      method: fixed
      start: 6
      length: 6
      whitelist: examples/FB_WL.txt
      correction:
        max_shift: 0
        allow_shift: false

umi:
  name: UMI
  segments:
    - segment: UMI
      read: R2
      method: fixed
      start: 0
      length: 6
      correction:
        enabled: false

downsample:
  enabled: true
  ratios: auto
  random_seed: 12345
  repeats: 1

quick_test:
  enabled: true
  reads: 10000

performance:
  threads: 2
  # Barcode whitelist correction is parallelized by extracted-read chunks.
  # Omit barcode_workers to use the same value as threads.
  # barcode_workers: 2
  # Omit umi_workers to use the same value as threads. Lower it independently
  # when UMI-tools worker memory, rather than CPU, is the limiting resource.
  # umi_workers: 2
  umi_batch_size: 5000
  umi_sqlite_cache_mb: 64
  chunk_size: 10000
  extraction_preview_reads: 1000
  compression_level: 3

resume:
  enabled: true
  overwrite: false
